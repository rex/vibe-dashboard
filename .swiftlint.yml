# SwiftLint — tuned for the Vibe Dashboard house style (terse, mono-dominant).

disabled_rules:
  - identifier_name              # short names (fm, r, g, tone) are idiomatic here
  - trailing_comma
  - optional_data_string_conversion
  - todo

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 400
  error: 500

file_length:
  warning: 300
  error: 450          # mirrors the architecture gate's spirit (hard 400 + slack)

function_body_length:
  warning: 80
  error: 140

cyclomatic_complexity:
  warning: 18
  error: 30

nesting:
  type_level: 3

excluded:
  - VibeDashboard/Generated
  - .build
