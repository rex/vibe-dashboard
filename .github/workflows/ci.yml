name: CI

# The gate. A green run means the app builds, all tests pass, SwiftLint is
# clean, no god-files, docs are within size, and the privacy-manifest /
# usage-description / no-cocoapods audits pass — exactly `make validate`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: make validate (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: make validate
        run: make validate
